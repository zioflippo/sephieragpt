<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SephieraGPT</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #212121;
    color: #ececec;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid #2f2f2f;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  header .title {
    font-size: 16px;
    font-weight: 600;
  }
  header .right-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: #b4b4b4;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .icon-btn:hover { background: #2f2f2f; color: #ececec; }
  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .bubble {
    max-width: 85%;
    padding: 10px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .user {
    align-self: flex-end;
    background: #2f2f2f;
    color: #ececec;
  }
  .ai {
    align-self: flex-start;
    background: transparent;
    color: #ececec;
    padding-left: 0;
    max-width: 100%;
  }
  .placeholder-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .placeholder-wrap h2 {
    font-size: 22px;
    font-weight: 500;
    color: #ececec;
    margin: 0 0 6px;
  }
  .placeholder-wrap p {
    font-size: 14px;
    color: #8e8e8e;
    margin: 0;
  }
  #input-area {
    padding: 12px 16px 20px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    flex-shrink: 0;
  }
  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: #2f2f2f;
    border-radius: 24px;
    padding: 10px 10px 10px 18px;
  }
  #user-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: #ececec;
    font-size: 15px;
    resize: none;
    max-height: 160px;
    line-height: 1.5;
    padding: 6px 0;
  }
  #user-input::placeholder { color: #8e8e8e; }
  #send-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: #ececec;
    color: #212121;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  #send-btn:disabled { background: #555; color: #999; cursor: not-allowed; }
  .model-pill {
    font-size: 13px;
    color: #b4b4b4;
    background: #2f2f2f;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .model-pill:hover { background: #3a3a3a; color: #ececec; }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #2f2f2f;
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 420px;
  }
  .modal-box h3 {
    margin: 0 0 16px;
    font-size: 17px;
    font-weight: 600;
  }
  .modal-box label {
    font-size: 13px;
    color: #b4b4b4;
    display: block;
    margin-bottom: 6px;
  }
  .modal-box input, .modal-box select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #4d4d4d;
    background: #212121;
    color: #ececec;
    font-size: 14px;
    margin-bottom: 16px;
  }
  .modal-box p.hint {
    font-size: 12px;
    color: #8e8e8e;
    margin: -10px 0 16px;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .modal-actions button {
    padding: 9px 16px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-secondary { background: #4d4d4d; color: #ececec; }
  .btn-secondary:hover { background: #5a5a5a; }
  .btn-primary { background: #ececec; color: #212121; }
  .btn-primary:hover { background: #d6d6d6; }
  #key-warning {
    font-size: 12px;
    margin: -10px 0 16px;
    color: #f87171;
    display: none;
  }
</style>
</head>
<body>

<header>
  <span class="title">SephieraGPT</span>
  <div class="right-controls">
    <button class="icon-btn" id="reset-btn" title="Mula perbualan baru">
      <i>&#10227;</i>
    </button>
    <button class="icon-btn" id="settings-btn" title="Tetapan">
      <i>&#9881;</i>
    </button>
  </div>
</header>

<div id="chat-window">
  <div class="placeholder-wrap" id="placeholder">
    <div>
      <h2>SephieraGPT</h2>
      <p>Klik ikon tetapan untuk masukkan API key, lepas tu mula tanya apa-apa.</p>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="user-input" placeholder="Tanya apa-apa..." rows="1"></textarea>
    <button id="send-btn" title="Hantar">&#8593;</button>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal-box">
    <h3>Tetapan</h3>
    <label for="api-key">API key Groq</label>
    <input type="password" id="api-key" placeholder="gsk_...">
    <p class="hint">Disimpan dalam browser encik sahaja (localStorage). Tidak dihantar ke sesiapa selain Groq.</p>
    <p id="key-warning">Sila masukkan API key dahulu.</p>

    <label for="model-select">Model</label>
    <select id="model-select">
      <option value="openai/gpt-oss-120b">GPT-OSS 120B (paling pintar, soalan rumit)</option>
      <option value="openai/gpt-oss-20b">GPT-OSS 20B (laju, ringkas)</option>
      <option value="qwen/qwen3-32b">Qwen3 32B (logik dan matematik)</option>
      <option value="deepseek-r1-distill-llama-70b">DeepSeek R1 Distill (reasoning step-by-step)</option>
      <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout (faham imej)</option>
    </select>

    <div class="modal-actions">
      <button class="btn-secondary" id="close-modal">Tutup</button>
      <button class="btn-primary" id="save-settings">Simpan</button>
    </div>
  </div>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const placeholder = document.getElementById('placeholder');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const resetBtn = document.getElementById('reset-btn');
  const settingsBtn = document.getElementById('settings-btn');
  const settingsModal = document.getElementById('settings-modal');
  const closeModal = document.getElementById('close-modal');
  const saveSettings = document.getElementById('save-settings');
  const apiKeyInput = document.getElementById('api-key');
  const modelSelect = document.getElementById('model-select');
  const keyWarning = document.getElementById('key-warning');

  let apiKey = localStorage.getItem('groq_api_key') || '';
  let conversationHistory = JSON.parse(localStorage.getItem('sephiera_history') || '[]');

  apiKeyInput.value = apiKey;
  const savedModel = localStorage.getItem('groq_model');
  if (savedModel) modelSelect.value = savedModel;

  function openSettings() {
    settingsModal.classList.add('open');
    keyWarning.style.display = 'none';
  }
  function closeSettings() {
    settingsModal.classList.remove('open');
  }

  settingsBtn.addEventListener('click', openSettings);
  closeModal.addEventListener('click', closeSettings);
  settingsModal.addEventListener('click', (e) => {
    if (e.target === settingsModal) closeSettings();
  });

  saveSettings.addEventListener('click', () => {
    const val = apiKeyInput.value.trim();
    if (!val) {
      keyWarning.style.display = 'block';
      return;
    }
    apiKey = val;
    localStorage.setItem('groq_api_key', apiKey);
    localStorage.setItem('groq_model', modelSelect.value);
    closeSettings();
  });

  modelSelect.addEventListener('change', () => {
    localStorage.setItem('groq_model', modelSelect.value);
  });

  function addMessage(text, sender) {
    placeholder.style.display = 'none';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + sender;
    bubble.textContent = text;
    chatWindow.appendChild(bubble);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  function renderHistory() {
    chatWindow.querySelectorAll('.bubble').forEach(b => b.remove());
    if (conversationHistory.length === 0) {
      placeholder.style.display = 'flex';
      return;
    }
    placeholder.style.display = 'none';
    conversationHistory.forEach(msg => {
      addMessage(msg.content, msg.role === 'user' ? 'user' : 'ai');
    });
  }

  function saveHistory() {
    localStorage.setItem('sephiera_history', JSON.stringify(conversationHistory));
  }

  resetBtn.addEventListener('click', () => {
    conversationHistory = [];
    saveHistory();
    renderHistory();
  });

  renderHistory();

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
  });

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;
    if (!apiKey) {
      openSettings();
      keyWarning.style.display = 'block';
      return;
    }
    addMessage(text, 'user');
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    conversationHistory.push({ role: 'user', content: text });
    saveHistory();
    const aiBubble = addMessage('', 'ai');
    let fullReply = '';

    try {
      const response = await fetch(
        'https://api.groq.com/openai/v1/chat/completions',
        {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
          },
          body: JSON.stringify({
            model: modelSelect.value,
            messages: conversationHistory,
            stream: true
          })
        }
      );

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error ? errData.error.message : 'Ralat tidak diketahui');
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;
          const payload = trimmed.slice(5).trim();
          if (payload === '[DONE]') continue;
          try {
            const json = JSON.parse(payload);
            const delta = json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content;
            if (delta) {
              fullReply += delta;
              aiBubble.textContent = fullReply;
              chatWindow.scrollTop = chatWindow.scrollHeight;
            }
          } catch (e) {}
        }
      }

      if (fullReply) {
        conversationHistory.push({ role: 'assistant', content: fullReply });
        saveHistory();
      } else {
        aiBubble.textContent = 'Tiada jawapan diterima.';
      }
    } catch (err) {
      aiBubble.textContent = 'Ralat: ' + err.message;
      conversationHistory.pop();
      saveHistory();
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
