<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SephieraGPT</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #212121;
    color: #ececec;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid #2f2f2f;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  header .title {
    font-size: 16px;
    font-weight: 600;
  }
  header .right-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: #b4b4b4;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .icon-btn:hover { background: #2f2f2f; color: #ececec; }
  #chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .bubble {
    max-width: 85%;
    padding: 10px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .user {
    align-self: flex-end;
    background: #2f2f2f;
    color: #ececec;
  }
  .ai {
    align-self: flex-start;
    background: transparent;
    color: #ececec;
    padding-left: 0;
    max-width: 100%;
  }
  .placeholder-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .placeholder-wrap h2 {
    font-size: 22px;
    font-weight: 500;
    color: #ececec;
    margin: 0 0 6px;
  }
  .placeholder-wrap p {
    font-size: 14px;
    color: #8e8e8e;
    margin: 0;
  }
  #input-area {
    padding: 12px 16px 20px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    flex-shrink: 0;
  }
  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: #2f2f2f;
    border-radius: 24px;
    padding: 10px 10px 10px 18px;
  }
  #user-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: #ececec;
    font-size: 15px;
    resize: none;
    max-height: 160px;
    line-height: 1.5;
    padding: 6px 0;
  }
  #user-input::placeholder { color: #8e8e8e; }
  #send-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: #ececec;
    color: #212121;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  #send-btn:disabled { background: #555; color: #999; cursor: not-allowed; }
  .upload-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #b4b4b4;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .upload-btn:hover { background: #3a3a3a; color: #ececec; }
  #attached-files {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }
  .file-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #2f2f2f;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    color: #ececec;
  }
  .file-chip button {
    background: none;
    border: none;
    color: #8e8e8e;
    cursor: pointer;
    font-size: 14px;
    padding: 0;
  }
  .file-chip button:hover { color: #f87171; }
  .model-pill {
    font-size: 13px;
    color: #b4b4b4;
    background: #2f2f2f;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
  }
  .model-pill:hover { background: #3a3a3a; color: #ececec; }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #2f2f2f;
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 420px;
  }
  .modal-box h3 {
    margin: 0 0 16px;
    font-size: 17px;
    font-weight: 600;
  }
  .modal-box label {
    font-size: 13px;
    color: #b4b4b4;
    display: block;
    margin-bottom: 6px;
  }
  .modal-box input, .modal-box select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #4d4d4d;
    background: #212121;
    color: #ececec;
    font-size: 14px;
    margin-bottom: 16px;
  }
  .modal-box p.hint {
    font-size: 12px;
    color: #8e8e8e;
    margin: -10px 0 16px;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .modal-actions button {
    padding: 9px 16px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-secondary { background: #4d4d4d; color: #ececec; }
  .btn-secondary:hover { background: #5a5a5a; }
  .btn-primary { background: #ececec; color: #212121; }
  .btn-primary:hover { background: #d6d6d6; }
  #key-warning {
    font-size: 12px;
    margin: -10px 0 16px;
    color: #f87171;
    display: none;
  }
</style>
</head>
<body>

<header>
  <span class="title">SephieraGPT</span>
  <div class="right-controls">
    <button class="icon-btn" id="reset-btn" title="Mula perbualan baru">
      <i>&#10227;</i>
    </button>
    <button class="icon-btn" id="settings-btn" title="Tetapan">
      <i>&#9881;</i>
    </button>
  </div>
</header>

<div id="chat-window">
  <div class="placeholder-wrap" id="placeholder">
    <div>
      <h2>SephieraGPT</h2>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="attached-files"></div>
  <div id="input-row">
    <button class="upload-btn" id="upload-btn" title="Lampirkan fail">&#128206;</button>
    <input type="file" id="file-input" multiple accept=".txt,.md,.csv,.json,.png,.jpg,.jpeg,.webp" style="display:none;">
    <textarea id="user-input" placeholder="Tanya apa-apa..." rows="1"></textarea>
    <button id="send-btn" title="Hantar">&#8593;</button>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal-box">
    <h3>Tetapan</h3>
    <label for="api-key">API key Groq</label>
    <input type="password" id="api-key" placeholder="gsk_...">
    <p class="hint">Disimpan dalam browser encik sahaja (localStorage). Tidak dihantar ke sesiapa selain Groq.</p>
    <p id="key-warning">Sila masukkan API key dahulu.</p>

    <label for="model-select">Model</label>
    <select id="model-select">
      <option value="openai/gpt-oss-120b">GPT-OSS 120B (paling pintar, soalan rumit)</option>
      <option value="openai/gpt-oss-20b">GPT-OSS 20B (laju, ringkas)</option>
      <option value="qwen/qwen3-32b">Qwen3 32B (logik dan matematik)</option>
      <option value="deepseek-r1-distill-llama-70b">DeepSeek R1 Distill (reasoning step-by-step)</option>
      <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout (faham imej)</option>
    </select>

    <label for="system-prompt">Arahan tetap (System Prompt)</label>
    <textarea id="system-prompt" rows="3" placeholder="Contoh: Sentiasa panggil saya 'Tuan'. Jawab terus, jangan berbasa-basi." style="width:100%; padding:10px 12px; border-radius:8px; border:1px solid #4d4d4d; background:#212121; color:#ececec; font-size:14px; margin-bottom:6px; resize:vertical; font-family:inherit;"></textarea>
    <p class="hint">Arahan ini akan dihantar setiap kali, supaya AI sentiasa ingat cara dia patut berkelakuan.</p>

    <div class="modal-actions">
      <button class="btn-secondary" id="close-modal">Tutup</button>
      <button class="btn-primary" id="save-settings">Simpan</button>
    </div>
  </div>
</div>

<script>
  const chatWindow = document.getElementById('chat-window');
  const placeholder = document.getElementById('placeholder');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const resetBtn = document.getElementById('reset-btn');
  const settingsBtn = document.getElementById('settings-btn');
  const settingsModal = document.getElementById('settings-modal');
  const closeModal = document.getElementById('close-modal');
  const saveSettings = document.getElementById('save-settings');
  const apiKeyInput = document.getElementById('api-key');
  const modelSelect = document.getElementById('model-select');
  const systemPromptInput = document.getElementById('system-prompt');
  const keyWarning = document.getElementById('key-warning');
  const uploadBtn = document.getElementById('upload-btn');
  const fileInput = document.getElementById('file-input');
  const attachedFilesDiv = document.getElementById('attached-files');

  let attachedFiles = [];

  function isImageFile(file) {
    return file.type.startsWith('image/');
  }

  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsText(file);
    });
  }

  function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function renderAttachedFiles() {
    attachedFilesDiv.innerHTML = '';
    attachedFiles.forEach((f, idx) => {
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      chip.innerHTML = '<span>' + f.name + '</span>';
      const removeBtn = document.createElement('button');
      removeBtn.textContent = '\u2715';
      removeBtn.addEventListener('click', () => {
        attachedFiles.splice(idx, 1);
        renderAttachedFiles();
      });
      chip.appendChild(removeBtn);
      attachedFilesDiv.appendChild(chip);
    });
  }

  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    const files = Array.from(fileInput.files);
    for (const file of files) {
      if (isImageFile(file)) {
        const dataUrl = await readFileAsDataURL(file);
        attachedFiles.push({ name: file.name, type: 'image', content: dataUrl });
      } else {
        try {
          const text = await readFileAsText(file);
          attachedFiles.push({ name: file.name, type: 'text', content: text });
        } catch (e) {
          attachedFiles.push({ name: file.name, type: 'text', content: '[Tidak dapat membaca fail ini]' });
        }
      }
    }
    renderAttachedFiles();
    fileInput.value = '';
  });

  let apiKey = localStorage.getItem('groq_api_key') || '';
  let conversationHistory = JSON.parse(localStorage.getItem('sephiera_history') || '[]');

  apiKeyInput.value = apiKey;
  const savedModel = localStorage.getItem('groq_model');
  if (savedModel) modelSelect.value = savedModel;
  systemPromptInput.value = localStorage.getItem('sephiera_system_prompt') || '';

  function openSettings() {
    settingsModal.classList.add('open');
    keyWarning.style.display = 'none';
  }
  function closeSettings() {
    settingsModal.classList.remove('open');
  }

  settingsBtn.addEventListener('click', openSettings);
  closeModal.addEventListener('click', closeSettings);
  settingsModal.addEventListener('click', (e) => {
    if (e.target === settingsModal) closeSettings();
  });

  saveSettings.addEventListener('click', () => {
    const val = apiKeyInput.value.trim();
    if (!val) {
      keyWarning.style.display = 'block';
      return;
    }
    apiKey = val;
    localStorage.setItem('groq_api_key', apiKey);
    localStorage.setItem('groq_model', modelSelect.value);
    localStorage.setItem('sephiera_system_prompt', systemPromptInput.value.trim());
    closeSettings();
  });

  modelSelect.addEventListener('change', () => {
    localStorage.setItem('groq_model', modelSelect.value);
  });

  function getDisplayText(content) {
    if (typeof content === 'string') return content;
    if (Array.isArray(content)) {
      const textPart = content.find(p => p.type === 'text');
      const imgCount = content.filter(p => p.type === 'image_url').length;
      let result = textPart ? textPart.text : '';
      if (imgCount > 0) result += (result ? '\n' : '') + '[' + imgCount + ' imej dilampirkan]';
      return result;
    }
    return '';
  }

  function addMessage(text, sender) {
    placeholder.style.display = 'none';
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + sender;
    bubble.textContent = text;
    chatWindow.appendChild(bubble);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  function renderHistory() {
    chatWindow.querySelectorAll('.bubble').forEach(b => b.remove());
    if (conversationHistory.length === 0) {
      placeholder.style.display = 'flex';
      return;
    }
    placeholder.style.display = 'none';
    conversationHistory.forEach(msg => {
      addMessage(getDisplayText(msg.content), msg.role === 'user' ? 'user' : 'ai');
    });
  }

  function saveHistory() {
    localStorage.setItem('sephiera_history', JSON.stringify(conversationHistory));
  }

  resetBtn.addEventListener('click', () => {
    conversationHistory = [];
    saveHistory();
    renderHistory();
  });

  renderHistory();

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
  });

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text && attachedFiles.length === 0) return;
    if (!apiKey) {
      openSettings();
      keyWarning.style.display = 'block';
      return;
    }

    const textFiles = attachedFiles.filter(f => f.type === 'text');
    const imageFiles = attachedFiles.filter(f => f.type === 'image');

    let displayText = text;
    if (textFiles.length > 0 || imageFiles.length > 0) {
      const names = attachedFiles.map(f => f.name).join(', ');
      displayText = (text ? text + '\n\n' : '') + '[Fail dilampirkan: ' + names + ']';
    }
    addMessage(displayText, 'user');

    let messageForApi;
    if (imageFiles.length > 0) {
      const contentParts = [];
      let combinedText = text;
      textFiles.forEach(f => {
        combinedText += '\n\n--- Kandungan fail: ' + f.name + ' ---\n' + f.content;
      });
      if (combinedText.trim()) contentParts.push({ type: 'text', text: combinedText });
      imageFiles.forEach(f => {
        contentParts.push({ type: 'image_url', image_url: { url: f.content } });
      });
      messageForApi = { role: 'user', content: contentParts };
    } else {
      let combinedText = text;
      textFiles.forEach(f => {
        combinedText += '\n\n--- Kandungan fail: ' + f.name + ' ---\n' + f.content;
      });
      messageForApi = { role: 'user', content: combinedText };
    }

    userInput.value = '';
    userInput.style.height = 'auto';
    attachedFiles = [];
    renderAttachedFiles();
    sendBtn.disabled = true;
    conversationHistory.push(messageForApi);
    saveHistory();
    const aiBubble = addMessage('', 'ai');
    let fullReply = '';

    try {
      const systemPrompt = localStorage.getItem('sephiera_system_prompt') || '';
      const messagesToSend = systemPrompt
        ? [{ role: 'system', content: systemPrompt }, ...conversationHistory]
        : conversationHistory;

      const response = await fetch(
        'https://api.groq.com/openai/v1/chat/completions',
        {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
          },
          body: JSON.stringify({
            model: modelSelect.value,
            messages: messagesToSend,
            stream: true
          })
        }
      );

      if (!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error ? errData.error.message : 'Ralat tidak diketahui');
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;
          const payload = trimmed.slice(5).trim();
          if (payload === '[DONE]') continue;
          try {
            const json = JSON.parse(payload);
            const delta = json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content;
            if (delta) {
              fullReply += delta;
              aiBubble.textContent = fullReply;
              chatWindow.scrollTop = chatWindow.scrollHeight;
            }
          } catch (e) {}
        }
      }

      if (fullReply) {
        conversationHistory.push({ role: 'assistant', content: fullReply });
        saveHistory();
      } else {
        aiBubble.textContent = 'Tiada jawapan diterima.';
      }
    } catch (err) {
      aiBubble.textContent = 'Ralat: ' + err.message;
      conversationHistory.pop();
      saveHistory();
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
